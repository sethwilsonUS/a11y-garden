<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A11y Garden</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <p class="eyebrow">A11y Garden</p>
        <h1>Live Scan</h1>
        <p class="lede">
          Scan the current tab as you see it, then open a protected hosted result.
        </p>
      </header>

      <section class="card" aria-labelledby="current-tab-title">
        <p class="label">Current tab</p>
        <h2 id="current-tab-title" class="tab-title">Loading…</h2>
        <p id="current-tab-url" class="tab-url"></p>
      </section>

      <section class="card" aria-labelledby="scan-settings-title">
        <h2 id="scan-settings-title" class="section-title">Scan Settings</h2>

        <label class="field">
          <span class="label">A11y Garden origin</span>
          <input
            id="app-origin"
            type="url"
            inputmode="url"
            spellcheck="false"
            placeholder="https://a11ygarden.org"
          />
        </label>

        <fieldset class="modes">
          <legend class="label">Mode</legend>
          <label class="mode-option">
            <input type="radio" name="mode" value="fast" checked />
            <span>
              <strong>Fast</strong>
              <small>axe-only strict scan</small>
            </span>
          </label>
          <label class="mode-option">
            <input type="radio" name="mode" value="deep" />
            <span>
              <strong>Deep</strong>
              <small>axe + HTMLCS + ACE</small>
            </span>
          </label>
        </fieldset>

        <button id="scan-button" class="scan-button" type="button">
          Scan Current Tab
        </button>
        <p id="status" class="status" role="status" aria-live="polite"></p>
      </section>

      <section id="last-result-card" class="card result-card" hidden aria-labelledby="last-result-title">
        <h2 id="last-result-title" class="section-title">Last Result</h2>
        <p id="last-result-name" class="result-title"></p>
        <p id="last-result-summary" class="result-summary"></p>
        <button id="open-result-button" class="secondary-button" type="button">
          Open Result
        </button>
      </section>

      <p class="footnote">
        Screenshots are intentionally omitted for extension scans in v1.
      </p>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
